<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Demo-Seite für Einbettung als iFrame in Genesys Cloud Agent Scripts." />
  <title>Genesys Agent Script – Demo</title>

  <style>
    /* Reset & Basis */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }

    :root {
      --bg: #f6f7fb;
      --surface: #ffffff;
      --border: #e3e6ef;
      --text: #1f2330;
      --muted: #6b7280;
      --primary: #4a55e0;
      --primary-hover: #3b46c4;
      --success: #10b981;
      --shadow: 0 1px 2px rgba(16, 24, 40, 0.04), 0 4px 12px rgba(16, 24, 40, 0.06);
      --radius: 10px;
      --gap: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f111a;
        --surface: #181b25;
        --border: #262a37;
        --text: #e6e8ef;
        --muted: #9aa1b1;
        --primary: #6b76ff;
        --primary-hover: #8089ff;
        --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 4px 12px rgba(0,0,0,0.4);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
      padding: 16px;
    }

    .card {
      max-width: 720px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--gap);
      margin-bottom: 18px;
    }

    h1 {
      font-size: 1.15rem;
      margin: 0;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--primary) 12%, transparent);
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* Datenliste */
    .data-grid {
      display: grid;
      grid-template-columns: minmax(120px, max-content) 1fr;
      gap: 8px 16px;
      margin: 0 0 18px 0;
    }

    .data-grid dt {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 500;
      align-self: center;
    }

    .data-grid dd {
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.9rem;
      word-break: break-all;
      padding: 6px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .data-grid dd.empty {
      color: var(--muted);
      font-style: italic;
    }

    /* Aktionen */
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    button {
      font: inherit;
      cursor: pointer;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 9px 16px;
      font-weight: 500;
      transition: background-color 0.15s ease, border-color 0.15s ease, transform 0.05s ease;
    }

    button:active { transform: translateY(1px); }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover { background: var(--primary-hover); }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border-color: var(--border);
    }
    .btn-secondary:hover { background: var(--bg); }

    /* Status-Toast */
    .toast {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.88rem;
      background: color-mix(in srgb, var(--success) 14%, transparent);
      color: var(--success);
      border: 1px solid color-mix(in srgb, var(--success) 35%, transparent);
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
    }
    .toast.visible {
      opacity: 1;
      transform: translateY(0);
    }

    footer {
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .data-grid {
        grid-template-columns: 1fr;
        gap: 4px;
      }
      .data-grid dt { margin-top: 6px; }
      header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <header>
      <h1>Interaktionsdetails</h1>
      <span class="badge">Demo</span>
    </header>

    <!-- Datenanzeige: wird zur Laufzeit aus URL-Parametern befüllt -->
    <dl class="data-grid" id="data-grid">
      <dt>Interaction ID</dt>
      <dd data-field="interactionId"></dd>

      <dt>ANI</dt>
      <dd data-field="ani"></dd>

      <dt>Queue</dt>
      <dd data-field="queue"></dd>

      <dt>Agent</dt>
      <dd data-field="agent"></dd>
    </dl>

    <div class="actions">
      <button type="button" class="btn-primary" id="btn-action">
        Beispielaktion ausführen
      </button>
      <button type="button" class="btn-secondary" id="btn-copy">
        Daten kopieren
      </button>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <footer>
      Statische Demo-Seite – nur für Test- und Demonstrationszwecke.
    </footer>
  </main>

  <script>
    (function () {
      "use strict";

      // Erlaubte URL-Parameter; alles andere wird ignoriert (Whitelist).
      const FIELDS = ["interactionId", "ani", "queue", "agent"];

      /** Liest die Whitelist-Parameter aus der aktuellen URL. */
      function readParams() {
        const params = new URLSearchParams(window.location.search);
        const data = {};
        for (const key of FIELDS) {
          data[key] = params.get(key);
        }
        return data;
      }

      /** Schreibt die Werte in die <dd>-Elemente; leere Werte werden markiert. */
      function renderData(data) {
        for (const key of FIELDS) {
          const el = document.querySelector(`[data-field="${key}"]`);
          if (!el) continue;
          const value = data[key];
          if (value && value.trim() !== "") {
            // textContent verhindert HTML-Injection aus URL-Parametern.
            el.textContent = value;
            el.classList.remove("empty");
          } else {
            el.textContent = "– nicht gesetzt –";
            el.classList.add("empty");
          }
        }
      }

      /** Kurzer eingeblendeter Hinweis. */
      function showToast(message) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.classList.add("visible");
        clearTimeout(showToast._t);
        showToast._t = setTimeout(() => toast.classList.remove("visible"), 2000);
      }

      const data = readParams();
      renderData(data);

      // Beispielaktion: in echtem Einsatz hier z. B. an Genesys Cloud
      // Platform API oder ein internes Backend-System weitergeben.
      document.getElementById("btn-action").addEventListener("click", () => {
        console.log("[Agent-Script-Demo] Beispielaktion ausgelöst:", data);
        showToast("Aktion ausgeführt – siehe Browser-Konsole.");
      });

      // Daten als JSON in die Zwischenablage; Fallback bei fehlendem Clipboard-API.
      document.getElementById("btn-copy").addEventListener("click", async () => {
        const json = JSON.stringify(data, null, 2);
        try {
          await navigator.clipboard.writeText(json);
          showToast("Daten in Zwischenablage kopiert.");
        } catch (err) {
          console.warn("[Agent-Script-Demo] Clipboard-API nicht verfügbar:", err);
          showToast("Kopieren nicht möglich – siehe Konsole.");
          console.log(json);
        }
      });
    })();
  </script>
</body>
</html>
